    <main>

        <section>
            <h2>Snow Conditions Guide</h2>

            <div class="conditions-grid">

                <div class="condition-card">
                    <img src="images/powder.jpg" alt="Powder skiing" >
                    <p><strong>Powder:</strong> soft, fresh snow (best skiing conditions!)</p>
                </div>

                <div class="condition-card">
                    <img src="images/groomer.jpg" alt="Groomed skiing">
                    <p><strong>Groomed:</strong> smooth, machine-packed trails</p>
                </div>

                <div class="condition-card">
                    <img src="images/icy.jpg" alt="Icy skiing">
                    <p><strong>Icy:</strong> hard, fast, and slippery conditions</p>
                </div>

                <div class="condition-card">
                    <img src="images/slushy.jpg" alt="Slushy skiing">
                    <p><strong>Slushy:</strong> wet spring snow, heavier skiing</p>
                </div>

            </div>
        </section>

        <section>
            <h2>Your Most Common Conditions</h2>
            <div id="conditionsStats"></div>
        </section>
